name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          OUTPUT="disk-explorer-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "-X main.version=${VERSION}" -o "${OUTPUT}" ./cmd/disk-explorer
          sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: disk-explorer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            disk-explorer-${{ matrix.goos }}-${{ matrix.goarch }}
            disk-explorer-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Build SHA256SUMS
        working-directory: dist
        run: |
          cat *.sha256 > SHA256SUMS
          rm *.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/disk-explorer-linux-amd64
            dist/disk-explorer-linux-arm64
            dist/disk-explorer-darwin-amd64
            dist/disk-explorer-darwin-arm64
            dist/SHA256SUMS
          generate_release_notes: true
